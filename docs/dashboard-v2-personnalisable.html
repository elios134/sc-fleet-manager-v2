<!DOCTYPE html>
<html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SC Fleet Manager — Dashboard personnalisable</title>
<style>
:root{--bg0:#0d0b1e;--bg1:#15112a;--bg2:#1a1433;--amber:#f5a623;--green:#2ee9a5;--blue:#378add;--teal:#5dcaa5;--pink:#d4537e;--purple:#7f77dd;--txt:#e8e6f0;--txt2:#9c99b0;--txt3:#6b6880;--card:rgba(255,255,255,0.03);--cardb:rgba(255,255,255,0.07);--glass:rgba(255,255,255,0.04);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,'Segoe UI',sans-serif;background:linear-gradient(160deg,var(--bg0),var(--bg1) 55%,var(--bg2));color:var(--txt);min-height:100vh;padding-bottom:120px;}
.titlebar{font-size:12px;color:var(--txt3);padding:14px 0 0 18px;}
.account{display:flex;justify-content:center;padding:14px 0 6px;}
.account-pill{display:flex;align-items:center;gap:8px;background:var(--glass);border:.5px solid rgba(255,255,255,.08);border-radius:24px;padding:6px 14px;cursor:pointer;}
.account-pill .av{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#3a3358,#252040);}
.account-pill .nm{font-size:14px;font-weight:500;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 32px 0;}
.topbar .eyebrow{font-size:11px;letter-spacing:1.5px;color:var(--txt3);font-weight:600;}
.topbar h1{font-size:24px;font-weight:600;color:#fff;letter-spacing:.5px;margin-top:2px;}
.btn-edit{display:flex;align-items:center;gap:7px;background:var(--glass);border:.5px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 16px;font-size:13px;color:var(--txt);font-weight:500;cursor:pointer;}
.btn-edit.active{background:var(--amber);color:#1a1206;border:none;}
.canvas{padding:20px 32px 0;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:440px;text-align:center;}
.empty .logo{width:84px;height:84px;border-radius:20px;background:var(--glass);border:.5px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:38px;margin-bottom:22px;}
.empty h2{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--txt2);max-width:340px;line-height:1.6;margin-bottom:22px;}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:#1a1206;border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.w{background:var(--card);border:.5px solid var(--cardb);border-radius:14px;padding:16px;position:relative;}
.w.col2{grid-column:span 2;}.w.col4{grid-column:span 4;}.w.col3{grid-column:span 3;}
.w-title{font-size:11px;letter-spacing:1px;color:var(--txt2);font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.w-title a{font-size:11px;color:var(--amber);text-decoration:none;letter-spacing:0;}
.w-remove{display:none;position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:#d4537e;color:#fff;border:none;font-size:14px;cursor:pointer;align-items:center;justify-content:center;z-index:5;}
.editing .w{border-style:dashed;border-color:rgba(245,166,35,.35);}
.editing .w-remove{display:flex;}
.editing .w{cursor:grab;}
.bigval{font-size:26px;font-weight:600;color:#fff;}
.bigval.amber{color:var(--amber);}.bigval.pink{color:var(--pink);}
.sub{font-size:12px;color:var(--txt2);margin-top:3px;}
.ins-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid rgba(255,255,255,.05);}
.ins-row:last-child{border-bottom:none;}
.ins-row .nm{font-size:13px;}.ins-row .mfg{font-size:10px;color:var(--txt3);}
.ins-row .exp{font-size:12px;font-weight:600;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}
.mission{padding:9px 0;border-bottom:.5px solid rgba(255,255,255,.05);}
.mission:last-child{border-bottom:none;}
.mission .mt{font-size:12px;font-weight:600;color:#fff;}.mission .mr{font-size:11px;color:var(--green);margin-top:2px;}
.qlb{display:flex;gap:10px;overflow-x:auto;}
.qlcard{min-width:108px;background:var(--glass);border:.5px solid var(--cardb);border-radius:10px;padding:9px;}
.qlcard .thumb{width:100%;height:48px;border-radius:6px;background:linear-gradient(135deg,#252040,#1a1530);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--txt3);margin-bottom:7px;}
.qlcard .qn{font-size:11px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.modules-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modmini{display:flex;align-items:center;gap:9px;background:var(--glass);border:.5px solid var(--cardb);border-radius:9px;padding:9px 11px;cursor:pointer;}
.modmini .mi{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.modmini .mn{font-size:12px;font-weight:600;color:#fff;}
.drawer{position:fixed;bottom:0;left:0;right:0;background:rgba(18,14,36,0.98);border-top:.5px solid rgba(255,255,255,.12);padding:18px 32px 90px;transform:translateY(100%);transition:transform .25s;z-index:20;max-height:60vh;overflow-y:auto;}
.drawer.open{transform:translateY(0);}
.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.drawer-head h3{font-size:15px;font-weight:600;color:#fff;}
.drawer-head .x{background:none;border:none;color:var(--txt2);font-size:22px;cursor:pointer;}
.lib{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.libcard{background:var(--card);border:.5px solid var(--cardb);border-radius:12px;padding:14px;cursor:pointer;transition:.15s;}
.libcard:hover{border-color:rgba(245,166,35,.4);background:rgba(245,166,35,.05);}
.libcard .li{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:9px;}
.libcard .ln{font-size:13px;font-weight:600;color:#fff;}
.libcard .ld{font-size:11px;color:var(--txt2);margin-top:3px;line-height:1.4;}
.libcard .added{font-size:10px;color:var(--green);margin-top:6px;display:none;}
.libcard.added-state{border-color:rgba(46,233,165,.3);}
.libcard.added-state .added{display:block;}
.navbar{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:4px;background:rgba(20,16,38,.92);border:.5px solid rgba(255,255,255,.1);border-radius:30px;padding:7px 10px;z-index:10;}
.nav-ico{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:16px;cursor:pointer;}
.nav-ico.active{background:var(--amber);color:#1a1206;}
.nav-feat{display:flex;align-items:center;gap:6px;padding:0 12px;color:var(--txt2);font-size:13px;cursor:pointer;}
</style></head><body>
<div class="titlebar">sc-fleet-manager-v2</div>
<div class="account"><div class="account-pill"><div class="av"></div><span class="nm">elios5</span><span style="color:var(--txt3);font-size:12px;">▾</span></div></div>
<div class="topbar"><div><div class="eyebrow">TABLEAU DE BORD</div><h1>Mon cockpit</h1></div>

</div>

</div>

  var wdef=WIDGETS[key];var d=document.createElement('div');
  d.className='w '+colClass(wdef.span);
  d.innerHTML='<button class="w-remove" onclick="removeWidget('+idx+')">×</button>'+wdef.html;
  g.appendChild(d);
 });
 document.getElementById('emptyState').style.display=placed.length?'none':'flex';
 g.style.display=placed.length?'grid':'none';
}
function addWidget(key){
 if(placed.indexOf(key)>=0)return;
 placed.push(key);renderGrid();
 var card=document.querySelector('.libcard[data-k="'+key+'"]');if(card)card.classList.add('added-state');
}
function removeWidget(idx){placed.splice(idx,1);renderGrid();buildLib();}
function buildLib(){
 var lib=document.getElementById('lib');lib.innerHTML='';
 Object.keys(WIDGETS).forEach(function(key){
  var w=WIDGETS[key];var c=document.createElement('div');
  c.className='libcard'+(placed.indexOf(key)>=0?' added-state':'');c.dataset.k=key;
  c.innerHTML='<div class="li" style="background:'+w.col+';color:'+w.cc+';">'+w.ico+'</div><div class="ln">'+w.name+'</div><div class="ld">'+w.desc+'</div><div class="added">✓ Ajouté</div>';
  c.onclick=function(){addWidget(key);};
  lib.appendChild(c);
 });
}
function toggleEdit(){
 editing=!editing;
 document.getElementById('canvas').classList.toggle('editing',editing);
 document.getElementById('editBtn').classList.toggle('active',editing);
 document.getElementById('editLabel').textContent=editing?'Terminer':'Personnaliser';
 if(editing)openDrawer();else closeDrawer();
}
function openDrawer(){
 if(!editing)toggleEdit();
 document.getElementById('drawer').classList.add('open');buildLib();
}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}
buildLib();renderGrid();
</script>
</body></html>
